config_version: 2

server:
  host: "0.0.0.0"
  port: 8080
  proxy: ""
  auth:
    enabled: true
    user_agent_prefix: "HarukiInternal/"
    bearer_token: "change-me"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

logging:
  level: "INFO"
  format: "pretty"
  file: ""
  access:
    enabled: true
    format: "[${time}] ${status} - ${method} ${path} ${latency}\n"
    file: "./logs/access.log"

execution:
  timeout_seconds: 300
  allow_cancel: true
  batch_save_size: 50
  workspace:
    # Empty means the system temp directory. Set this to a mounted scratch
    # volume in containers, for example /var/run/haruki/work.
    work_dir: ""
    cleanup_on_success: true
    # Optional upload staging dir for exported files. {region}/{server} and
    # {job_id} are expanded; without {job_id}, it is appended automatically.
    export_dir: ""
    cleanup_exports_on_success: true
  retry:
    attempts: 4
    initial_backoff_ms: 1000
    max_backoff_ms: 4000

tools:
  ffmpeg_path: "ffmpeg"
  asset_studio_cli_path: ""

concurrency:
  download: 4
  upload: 4
  acb: 8
  usm: 4
  hca: 16

storage:
  # OpenDAL-style providers. Keep this empty to disable upload globally.
  # Providers can be reused for asset upload and downloaded_assets.json state.
  #
  # Example S3/R2/MinIO-compatible provider:
  # providers:
  #   - name: assets
  #     scheme: s3
  #     root: "assets/{region}"
  #     public_base_url: "https://cdn.example.com/assets/{region}"
  #     options:
  #       bucket: "sekai-{region}-assets"
  #       endpoint: "https://s3.example.com"
  #       region: "auto"
  #       access_key_id: "${env:HARUKI_STORAGE_ACCESS_KEY_ID}"
  #       secret_access_key: "${env:HARUKI_STORAGE_SECRET_ACCESS_KEY}"
  #       default_acl: "public-read"
  #
  # Local filesystem provider for smoke tests:
  # providers:
  #   - name: local
  #     scheme: fs
  #     root: "./tmp/uploaded-assets"
  #     options: {}
  #
  # Local filesystem provider for downloaded_assets.json state:
  # providers:
  #   - name: local-state
  #     scheme: fs
  #     root: "./tmp/state"
  #     options: {}
  providers: []

git_sync:
  chart_hashes:
    enabled: false
    repository_dir: "./sekai-chart-hash"
    username: "none"
    email: "none"
    password: "change-me"
    sign_commits: false
    signing_format: "gpg" # gpg | ssh
    signing_key: "" # GPG key id, SSH public/private key path, or SSH public key
    signing_program: "" # optional: gpg.program for GPG or gpg.ssh.program for SSH

regions:
  jp:
    enabled: false
    provider:
      kind: colorful_palette
      asset_info_url_template: ""
      asset_bundle_url_template: ""
      profile: "production"
      profile_hashes: {}
      required_cookies: true
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/jp-assets"
      downloaded_asset_record_file: "./Data/jp-assets/downloaded_assets.json"
      # Prefer this in cloud-native deployments. The path is relative to the
      # selected OpenDAL provider root and supports {region}/{server}.
      # downloaded_asset_record_storage:
      #   provider: local-state
      #   path: "records/{region}/downloaded_assets.json"
    filters:
      start_app:
        - "bonds_honor"
        - "honor"
        - "thumbnail"
        - "character"
        - "music"
      on_demand:
        - "event"
        - "gacha"
        - "music"
      skip: []
      priority:
        - "^character/member.*"
        - "^event/.*"
        - "^gacha/.*"
        - ".*"
    export:
      by_category: false
      asset_studio:
        export_types:
          - monoBehaviour
          - textAsset
          - tex2d
          - tex2dArray
          - audio
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        convert_to_webp: false
        remove_png: false
      video:
        convert_to_mp4: true
        direct_usm_to_mp4_with_ffmpeg: true
        remove_m2v: true
      audio:
        convert_to_mp3: true
        convert_to_flac: false
        remove_wav: true
    upload:
      enabled: false
      remove_local_after_upload: false
      # Empty means all configured storage.providers. Set names here to upload
      # only to selected providers, for example ["assets"].
      providers: []

  cn:
    enabled: false
    provider:
      kind: nuverse
      asset_version_url: "https://lf3-mkcncdn-tos.dailygn.com/obj/rt-game-lf/gdl_app_5236/Mainland/{app_version}/Release/cn_online/ios/version"
      app_version: "5.2.0"
      asset_info_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/ios{asset_version}/AssetBundleInfoNew.json"
      asset_bundle_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/{bundle_path}"
      required_cookies: false
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/cn-assets"
      downloaded_asset_record_file: "./Data/cn-assets/downloaded_assets.json"
      # downloaded_asset_record_storage:
      #   provider: local-state
      #   path: "records/{region}/downloaded_assets.json"
    filters:
      start_app: []
      on_demand:
        - "music/long"
      skip: []
      priority:
        - "^music/.*"
        - ".*"
    export:
      by_category: false
      asset_studio:
        export_types:
          - monoBehaviour
          - textAsset
          - tex2d
          - tex2dArray
          - audio
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        convert_to_webp: false
        remove_png: false
      video:
        convert_to_mp4: true
        direct_usm_to_mp4_with_ffmpeg: false
        remove_m2v: true
      audio:
        convert_to_mp3: true
        convert_to_flac: false
        remove_wav: true
    upload:
      enabled: false
      remove_local_after_upload: false
      providers: []
