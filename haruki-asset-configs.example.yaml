config_version: 2

server:
  host: "0.0.0.0"
  port: 8080
  proxy: ""
  auth:
    enabled: true
    user_agent_prefix: "HarukiInternal/"
    bearer_token: "change-me"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

logging:
  level: "INFO"
  format: "pretty"
  file: ""
  access:
    enabled: true
    format: "[${time}] ${status} - ${method} ${path} ${latency}\n"
    file: "./logs/access.log"

execution:
  timeout_seconds: 300
  allow_cancel: true
  asset_bundle_cache_dir: "" # optional benchmark/debug raw bundle cache
  max_in_flight_bundle_bytes: 0 # 0 disables the soft memory guard; try 4294967296 on small Linux hosts
  batch_save_size: 50
  retry:
    attempts: 4
    initial_backoff_ms: 1000
    max_backoff_ms: 4000

tools:
  ffmpeg_path: "ffmpeg"
  media_backend: "ffi" # ffi preferred; auto | cli are legacy
  asset_studio_backend: "native" # native preferred; cli | auto are legacy
  asset_studio_cli_path: ""
  asset_studio_native_library_path: ""
  asset_studio_native_call_mode: "pool" # direct | process | pool
  asset_studio_native_worker_path: ""
  asset_studio_native_process_concurrency: 0 # 0 = auto: CPU budget, or CPU-count oversubscription when CPU throttle is enabled
  asset_studio_native_worker_max_calls: 256 # 0 disables recycling
  asset_studio_native_read_batch_size: 32 # context_read_objects chunk size
  asset_studio_native_image_format: "" # default raw_rgba; AssetStudioFFI image reads only support raw_rgba
  asset_studio_native_read_kinds: # optional per AssetStudio type selector
    Texture2D: image
    Sprite: image
    TextAsset: text_bytes
    MonoBehaviour: typetree_json
    AudioClip: audio
    Animator: fbx
    all: typetree_json
  asset_studio_native_unitypy_mode: true # compatibility only; native always uses object-level reads

concurrency:
  auto_tune: false # when true, values below are treated as caps and scaled to CPU count
  cpu_budget_auto: true
  cpu_budget_ratio: 0.75
  cpu_reserved: 1
  cpu_throttle_enabled: false # when true, gate CPU-heavy work by this process tree's sampled CPU budget
  cpu_throttle_sample_ms: 250
  download: 4
  upload: 4
  acb: 8
  usm: 4
  hca: 16
  media_encode: 12 # global FFmpeg/rsmpeg encode limit
  images: 4

storage:
  providers: []

git_sync:
  chart_hashes:
    enabled: false
    repository_dir: "./sekai-chart-hash"
    username: "none"
    email: "none"
    password: "change-me"
    sign_commits: false
    signing_format: "gpg" # gpg | ssh
    signing_key: "" # GPG key id, SSH public/private key path, or SSH public key
    signing_program: "" # optional: gpg.program for GPG or gpg.ssh.program for SSH

regions:
  jp:
    enabled: false
    provider:
      kind: colorful_palette
      asset_info_url_template: ""
      asset_bundle_url_template: ""
      profile: "production"
      profile_hashes: {}
      required_cookies: true
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/jp-assets"
      downloaded_asset_record_file: "./Data/jp-assets/downloaded_assets.json"
    filters:
      start_app:
        - "bonds_honor"
        - "honor"
        - "thumbnail"
        - "character"
        - "music"
      on_demand:
        - "event"
        - "gacha"
        - "music"
      skip: []
      priority:
        - "^character/member.*"
        - "^event/.*"
        - "^gacha/.*"
        - ".*"
    export:
      by_category: false
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        convert_to_webp: false
        remove_png: false
      video:
        convert_to_mp4: true
        direct_usm_to_mp4_with_ffmpeg: true
        remove_m2v: true
      audio:
        convert_to_mp3: true
        convert_to_flac: false
        remove_wav: true
    upload:
      enabled: false
      remove_local_after_upload: false

  cn:
    enabled: false
    provider:
      kind: nuverse
      asset_version_url: "https://lf3-mkcncdn-tos.dailygn.com/obj/rt-game-lf/gdl_app_5236/Mainland/{app_version}/Release/cn_online/ios/version"
      app_version: "5.2.0"
      asset_info_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/ios{asset_version}/AssetBundleInfoNew.json"
      asset_bundle_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/{bundle_path}"
      required_cookies: false
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/cn-assets"
      downloaded_asset_record_file: "./Data/cn-assets/downloaded_assets.json"
    filters:
      start_app: []
      on_demand:
        - "music/long"
      skip: []
      priority:
        - "^music/.*"
        - ".*"
    export:
      by_category: false
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        convert_to_webp: false
        remove_png: false
      video:
        convert_to_mp4: true
        direct_usm_to_mp4_with_ffmpeg: false
        remove_m2v: true
      audio:
        convert_to_mp3: true
        convert_to_flac: false
        remove_wav: true
    upload:
      enabled: false
      remove_local_after_upload: false
