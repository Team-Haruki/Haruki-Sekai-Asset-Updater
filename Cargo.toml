[package]
name = "haruki-sekai-asset-updater"
version = "0.1.0"
edition = "2021"
description = "Rust service for Haruki Sekai Asset Updater"
license = "MIT"

[dependencies]
aes = "0.8"
axum = { version = "0.8", features = ["macros", "json"] }
aws-config = "1.8"
aws-sdk-s3 = "1.115"
cbc = "0.1"
chrono = { version = "0.4", features = ["clock", "serde"] }
clap = { version = "4.5", features = ["derive"] }
cridecoder = "0.1.1"
git2 = "0.20"
hex = "0.4"
image = { version = "0.25", default-features = false, features = ["png", "webp"] }
mime_guess = "2.0"
regex = "1.12"
reqwest = { version = "0.12", default-features = false, features = ["brotli", "deflate", "gzip", "http2", "json", "rustls-tls"] }
rmp-serde = "1.3"
serde = { version = "1.0", features = ["derive"] }
sonic-rs = "0.5.8"
tempfile = "3.23"
thiserror = "2.0"
tokio = { version = "1.48", features = ["fs", "macros", "process", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1.18", features = ["serde", "v4"] }
yaml_serde = "0.10.4"

[dev-dependencies]
sha2 = "0.10"
tower = { version = "0.5", features = ["util"] }
